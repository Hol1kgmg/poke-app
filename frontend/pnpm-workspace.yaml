packages:
  - "."

# ビルドスクリプトの実行を許可するパッケージを明示的に制限（セキュリティホワイトリスト）
onlyBuiltDependencies:
  - esbuild
  - lefthook
  - lightningcss

# pnpm v11 の新しいビルド許可形式（onlyBuiltDependencies の代替）
allowBuilds:
  esbuild: true
  lefthook: true
  lightningcss: true
  sharp: true
  workerd: true

# リリース直後のパッケージを自動インストールしないサプライチェーン攻撃対策（48時間 = 2880分）
minimumReleaseAge: 2880
